name: Build and Test Flying Nimbus

on:
    pull_request:
        types: [opened, reopened, edited, synchronize, closed]

permissions:
    id-token: write
    contents: read

jobs:
    build:
        name: Build code
        runs-on: chopd3bPrd-linux-small
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Setup Golang
              uses: actions/setup-go@v6
              with:
                go-version: '1.25'
            - name: Setup build tools
              run: |
                sudo yum install -y make
            - name: Build code
              run: |
                make build
            