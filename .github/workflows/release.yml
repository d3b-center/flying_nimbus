name: Release FN

on:
    pull_request:
        # types: 
        #   - closed
        types: [opened, reopened, edited, synchronize, closed]

permissions:
    id-token: write
    contents: write

jobs:
    create_release:
        # if: github.base_ref == 'main' && github.event.pull_request.merged && contains( github.event.pull_request.labels.*.name, 'release')
        runs-on: ubuntu-latest
        outputs:
          tag_name: ${{ steps.find_tag_and_prepare_assets.outputs.tag }}
        steps:

        - uses: actions/checkout@v2
        - uses: actions/setup-python@v2
          with:
            python-version: 3.12
        - uses: actions/setup-go@v5
          with:
            go-version: '1.25'
        - name: Setup build tools
          run: |
            sudo apt install -y make
        - name: Build code
          run: |
            make release

        - name: Create tag from title and run asset script
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          id: find_tag_and_prepare_assets
          run: |
            TAG=$(echo ${{ github.event.pull_request.title }} | sed -E "s/^.*Release (.+\..+\..+)$/\1/g")
            echo "::set-output name=tag::$TAG"
            
            SCRIPT=.github/prepare_assets.sh
            if [ -f $SCRIPT ]; then 
                chmod u+x $SCRIPT
                $SCRIPT $TAG
            fi

            mv flying-nimbus-linux-amd64 flying-nimbus-linux-amd64-$TAG
            mv flying-nimbus-darwin-arm64 flying-nimbus-darwin-arm64-$TAG

            echo "flying-nimbus-linux-amd64-$TAG" >> .github/release_assets.txt
            echo "flying-nimbus-darwin-arm64-$TAG" >> .github/release_assets.txt

        - name: Create Release
          id: create_release
          uses: actions/create-release@v1
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            tag_name: ${{ steps.find_tag_and_prepare_assets.outputs.tag }}
            release_name: ${{ github.event.pull_request.title }}
            body: ${{ github.event.pull_request.body }}
            draft: false
            prerelease: false

        - name: Add latest-release tag
          run: |
            git tag -f latest-release
            git push -f --tags

        - name: Upload Assets
          run: |
            upload_url=${{ steps.create_release.outputs.upload_url }}
            if [ -f .github/release_assets.txt ]; then
                while IFS="" read -r FILE || [ -n "$FILE" ]
                do
                curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                    -H "Content-Type: $(file -b --mime-type $FILE)" \
                    --data-binary "@$FILE" \
                    "${upload_url%\{*}?name=$(basename $FILE)"
                done < .github/release_assets.txt
            fi