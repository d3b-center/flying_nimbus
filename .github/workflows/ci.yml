name: CI

on:
    pull_request:
        types: [opened, reopened, edited, synchronize, closed]

permissions:
    id-token: write
    contents: read

jobs:
    build_test:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Setup Golang
              uses: actions/setup-go@v6
              with:
                go-version: '1.25'
            - name: Setup build tools
              run: |
                sudo apt install -y make
            - name: Lint code
              run: |
                if [ -n "$(gofmt -l .)" ]; then
                    echo "Go files are not formatted. Run 'gofmt -w .'"
                    exit 1
                fi
            - name: Build code
              run: |
                make build
            - name: Test code
              run: |
                make test
            